name: update-digest

# 定時自動実行（3時間ごと）＋ 手動実行ボタン
on:
  schedule:
    - cron: "0 */3 * * *"   # UTC基準・3時間ごと
  workflow_dispatch: {}

permissions:
  contents: write            # 生成物をリポジトリに書き戻すため

concurrency:
  group: update-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          # ↓ APIキーは任意。未設定でもRSS抜粋で無料動作します。
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MAX_NEW_SUMMARIES: "15"   # 1回あたりの要約上限（課金制御）
        run: python generate.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html data/articles.json
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "auto: ダイジェスト更新 $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
